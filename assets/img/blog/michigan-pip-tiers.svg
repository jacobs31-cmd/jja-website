<svg viewBox="0 0 800 380" xmlns="http://www.w3.org/2000/svg" font-family="Inter,Arial,sans-serif">
  <rect width="800" height="380" fill="#f9fafb" rx="12"/>
  <text x="400" y="35" font-size="17" font-weight="700" fill="#14365e" text-anchor="middle">Michigan No-Fault PIP Coverage Options (2026)</text>
  <text x="400" y="54" font-size="13" fill="#6b7280" text-anchor="middle">Required to choose one when buying auto insurance in Michigan</text>

  <!-- Column headers -->
  <rect x="30" y="70" width="115" height="36" rx="4" fill="#e8f0f8"/>
  <text x="87" y="93" font-size="12" font-weight="700" fill="#14365e" text-anchor="middle">PIP Option</text>

  <rect x="150" y="70" width="105" height="36" rx="4" fill="#14365e"/>
  <text x="202" y="93" font-size="12" font-weight="700" fill="#ffffff" text-anchor="middle">Unlimited</text>

  <rect x="260" y="70" width="105" height="36" rx="4" fill="#1e4d8c"/>
  <text x="312" y="93" font-size="12" font-weight="700" fill="#ffffff" text-anchor="middle">$500K</text>

  <rect x="370" y="70" width="105" height="36" rx="4" fill="#2563eb"/>
  <text x="422" y="93" font-size="12" font-weight="700" fill="#ffffff" text-anchor="middle">$250K</text>

  <rect x="480" y="70" width="105" height="36" rx="4" fill="#4b7fd4"/>
  <text x="532" y="93" font-size="12" font-weight="700" fill="#ffffff" text-anchor="middle">$50K</text>

  <rect x="590" y="70" width="105" height="36" rx="4" fill="#7aa6dc"/>
  <text x="642" y="93" font-size="12" font-weight="700" fill="#ffffff" text-anchor="middle">Opt Out</text>

  <!-- Row 1: Who qualifies -->
  <text x="87" y="128" font-size="11" fill="#374151" text-anchor="middle">Who qualifies</text>
  <text x="202" y="128" font-size="11" fill="#374151" text-anchor="middle">Anyone</text>
  <text x="312" y="128" font-size="11" fill="#374151" text-anchor="middle">Anyone</text>
  <text x="422" y="128" font-size="11" fill="#374151" text-anchor="middle">Anyone</text>
  <text x="532" y="128" font-size="11" fill="#374151" text-anchor="middle">Medicaid</text>
  <text x="642" y="128" font-size="11" fill="#374151" text-anchor="middle">Medicare</text>
  <line x1="30" y1="138" x2="770" y2="138" stroke="#e5e7eb" stroke-width="1"/>

  <!-- Row 2: Medical coverage -->
  <text x="87" y="165" font-size="11" fill="#374151" text-anchor="middle">Medical limit</text>
  <text x="202" y="165" font-size="11" fill="#14365e" font-weight="700" text-anchor="middle">Unlimited</text>
  <text x="312" y="165" font-size="11" fill="#374151" text-anchor="middle">$500,000</text>
  <text x="422" y="165" font-size="11" fill="#374151" text-anchor="middle">$250,000</text>
  <text x="532" y="165" font-size="11" fill="#374151" text-anchor="middle">$50,000</text>
  <text x="642" y="165" font-size="11" fill="#dc2626" text-anchor="middle">None (other</text>
  <text x="642" y="178" font-size="11" fill="#dc2626" text-anchor="middle">insurer pays)</text>
  <line x1="30" y1="188" x2="770" y2="188" stroke="#e5e7eb" stroke-width="1"/>

  <!-- Row 3: Premium impact -->
  <text x="87" y="213" font-size="11" fill="#374151" text-anchor="middle">Premium impact</text>
  <text x="202" y="213" font-size="11" fill="#dc2626" text-anchor="middle">Highest</text>
  <text x="312" y="213" font-size="11" fill="#c8952a" text-anchor="middle">High</text>
  <text x="422" y="213" font-size="11" fill="#4b7fd4" text-anchor="middle">Moderate</text>
  <text x="532" y="213" font-size="11" fill="#16a34a" text-anchor="middle">Lower</text>
  <text x="642" y="213" font-size="11" fill="#16a34a" text-anchor="middle">Lowest</text>
  <line x1="30" y1="223" x2="770" y2="223" stroke="#e5e7eb" stroke-width="1"/>

  <!-- Row 4: Catastrophic injury protection -->
  <text x="87" y="248" font-size="11" fill="#374151" text-anchor="middle">Cata. coverage</text>
  <text x="202" y="248" font-size="11" fill="#16a34a" text-anchor="middle">Full MCCA</text>
  <text x="312" y="248" font-size="11" fill="#16a34a" text-anchor="middle">Full MCCA</text>
  <text x="422" y="248" font-size="11" fill="#16a34a" text-anchor="middle">Full MCCA</text>
  <text x="532" y="248" font-size="11" fill="#dc2626" text-anchor="middle">No MCCA</text>
  <text x="642" y="248" font-size="11" fill="#dc2626" text-anchor="middle">No MCCA</text>

  <!-- Note -->
  <rect x="30" y="275" width="740" height="88" rx="8" fill="#fff8e6" stroke="#c8952a" stroke-width="1"/>
  <text x="400" y="296" font-size="12" font-weight="700" fill="#c8952a" text-anchor="middle">⚠ Opt-Out (Option 6) Warning</text>
  <text x="400" y="315" font-size="11" fill="#374151" text-anchor="middle">Medicare has significant gaps — it doesn't cover all accident-related care, has copays/deductibles,</text>
  <text x="400" y="332" font-size="11" fill="#374151" text-anchor="middle">and can refuse coverage if accident-related care overlaps with excluded services.</text>
  <text x="400" y="351" font-size="11" fill="#374151" text-anchor="middle">Talk to a Michigan agent before choosing Option 6 — the premium savings may not be worth the risk.</text>
</svg>