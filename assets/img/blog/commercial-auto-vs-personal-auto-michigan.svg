<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#14365e"/>
      <stop offset="100%" stop-color="#0a2342"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4a9fd4" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#4a9fd4" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Accent bar top -->
  <rect x="0" y="0" width="1200" height="6" fill="#4a9fd4"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.04">
    <line x1="0" y1="105" x2="1200" y2="105" stroke="white" stroke-width="1"/>
    <line x1="0" y1="210" x2="1200" y2="210" stroke="white" stroke-width="1"/>
    <line x1="0" y1="315" x2="1200" y2="315" stroke="white" stroke-width="1"/>
    <line x1="0" y1="420" x2="1200" y2="420" stroke="white" stroke-width="1"/>
    <line x1="0" y1="525" x2="1200" y2="525" stroke="white" stroke-width="1"/>
    <line x1="200" y1="0" x2="200" y2="630" stroke="white" stroke-width="1"/>
    <line x1="400" y1="0" x2="400" y2="630" stroke="white" stroke-width="1"/>
    <line x1="600" y1="0" x2="600" y2="630" stroke="white" stroke-width="1"/>
    <line x1="800" y1="0" x2="800" y2="630" stroke="white" stroke-width="1"/>
    <line x1="1000" y1="0" x2="1000" y2="630" stroke="white" stroke-width="1"/>
  </g>

  <!-- Icon circle background -->
  <circle cx="600" cy="175" r="72" fill="white" fill-opacity="0.08"/>
  <circle cx="600" cy="175" r="60" fill="white" fill-opacity="0.06"/>

  <!-- Icon -->
  <g transform="translate(600,175)" fill="none" stroke="white" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round">
    <rect x="-42" y="-16" width="52" height="30" rx="3" fill="white" fill-opacity="0.12"/>
      <rect x="-42" y="-16" width="52" height="30" rx="3"/>
      <path d="M10 -16 L10 -4 L42 -4 L42 14 L-42 14" fill="none"/>
      <path d="M10 -16 L26 -16 L42 -4"/>
      <circle cx="-26" cy="20" r="8"/>
      <circle cx="26" cy="20" r="8"/>
      <rect x="-10" y="-8" width="18" height="14" rx="1" fill="white" fill-opacity="0.1"/>
  </g>

  <!-- Category label -->
  <text x="600" y="256" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="18" font-weight="600" fill="#4a9fd4" letter-spacing="2" text-transform="uppercase">AUTO INSURANCE</text>

  <!-- Title -->
  <text x="600" y="284" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="44" font-weight="700" fill="white" letter-spacing="-0.5">Commercial Auto vs. Personal</text>
<text x="600" y="340" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="44" font-weight="700" fill="white" letter-spacing="-0.5">Auto Insurance in Michigan</text>


  <!-- Bottom bar -->
  <rect x="0" y="580" width="1200" height="50" fill="black" fill-opacity="0.3"/>
  <text x="50" y="611" font-family="Inter,Arial,sans-serif" font-size="20" font-weight="700" fill="white" opacity="0.9">J. Jacobs &amp; Associates Insurance</text>
  <text x="1150" y="611" text-anchor="end" font-family="Inter,Arial,sans-serif" font-size="18" fill="white" opacity="0.6">jjainsurance.com</text>
</svg>