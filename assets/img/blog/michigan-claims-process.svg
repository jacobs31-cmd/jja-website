<svg viewBox="0 0 800 340" xmlns="http://www.w3.org/2000/svg" font-family="Inter,Arial,sans-serif">
  <rect width="800" height="340" fill="#f9fafb" rx="12"/>
  <text x="400" y="36" font-size="18" font-weight="700" fill="#14365e" text-anchor="middle">Michigan Homeowners Insurance Claims Process</text>

  <!-- Step boxes (4 steps now) -->
  <!-- Step 1 -->
  <rect x="40" y="65" width="150" height="90" rx="8" fill="#14365e"/>
  <text x="115" y="97" font-size="28" fill="#c8952a" text-anchor="middle" font-weight="700">1</text>
  <text x="115" y="118" font-size="11" fill="#ffffff" text-anchor="middle">Document</text>
  <text x="115" y="133" font-size="11" fill="#ffffff" text-anchor="middle">Damage</text>
  <text x="115" y="172" font-size="10" fill="#6b7280" text-anchor="middle">Photos &amp; video first</text>
  <text x="115" y="185" font-size="10" fill="#6b7280" text-anchor="middle">before touching anything</text>

  <polygon points="196,110 210,105 210,115" fill="#c8952a"/>
  <line x1="190" y1="110" x2="210" y2="110" stroke="#c8952a" stroke-width="2"/>

  <!-- Step 2 -->
  <rect x="215" y="65" width="150" height="90" rx="8" fill="#14365e"/>
  <text x="290" y="97" font-size="28" fill="#c8952a" text-anchor="middle" font-weight="700">2</text>
  <text x="290" y="118" font-size="11" fill="#ffffff" text-anchor="middle">Police Report</text>
  <text x="290" y="133" font-size="11" fill="#ffffff" text-anchor="middle">if theft/vandalism</text>
  <text x="290" y="172" font-size="10" fill="#6b7280" text-anchor="middle">Get report number</text>
  <text x="290" y="185" font-size="10" fill="#6b7280" text-anchor="middle">before calling insurer</text>

  <polygon points="371,110 385,105 385,115" fill="#c8952a"/>
  <line x1="365" y1="110" x2="385" y2="110" stroke="#c8952a" stroke-width="2"/>

  <!-- Step 3 -->
  <rect x="390" y="65" width="150" height="90" rx="8" fill="#c8952a"/>
  <text x="465" y="97" font-size="28" fill="#ffffff" text-anchor="middle" font-weight="700">3</text>
  <text x="465" y="118" font-size="11" fill="#ffffff" text-anchor="middle">Call Your</text>
  <text x="465" y="133" font-size="11" fill="#ffffff" text-anchor="middle">Agent First</text>
  <text x="465" y="172" font-size="10" fill="#6b7280" text-anchor="middle">Before the 800 number</text>
  <text x="465" y="185" font-size="10" fill="#6b7280" text-anchor="middle">Get claim guidance</text>

  <polygon points="546,110 560,105 560,115" fill="#c8952a"/>
  <line x1="540" y1="110" x2="560" y2="110" stroke="#c8952a" stroke-width="2"/>

  <!-- Step 4 -->
  <rect x="565" y="65" width="195" height="90" rx="8" fill="#16a34a"/>
  <text x="663" y="97" font-size="28" fill="#ffffff" text-anchor="middle" font-weight="700">4</text>
  <text x="663" y="118" font-size="11" fill="#ffffff" text-anchor="middle">Adjuster Visit</text>
  <text x="663" y="133" font-size="11" fill="#ffffff" text-anchor="middle">&amp; Settlement</text>
  <text x="663" y="172" font-size="10" fill="#6b7280" text-anchor="middle">Be present. Show everything.</text>
  <text x="663" y="185" font-size="10" fill="#6b7280" text-anchor="middle">You can negotiate the offer.</text>

  <!-- Key tips section -->
  <rect x="40" y="210" width="720" height="115" rx="8" fill="#14365e" opacity="0.06" stroke="#14365e" stroke-width="1" stroke-opacity="0.2"/>
  <text x="400" y="232" font-size="14" font-weight="700" fill="#14365e" text-anchor="middle">Smart Moves at Every Step</text>

  <text x="65" y="256" font-size="12" fill="#374151">📸 Document everything before you clean up — photos, video, timestamps</text>
  <text x="65" y="277" font-size="12" fill="#374151">📞 Call your agent before the carrier's 800 number — they advocate for you</text>
  <text x="65" y="298" font-size="12" fill="#374151">🔨 Don't start major repairs until the adjuster has seen the damage</text>
  <text x="65" y="319" font-size="12" fill="#374151">📋 Get your own contractor estimate — you don't have to accept the first offer</text>
</svg>