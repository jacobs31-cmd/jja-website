<svg viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg" font-family="Inter,Arial,sans-serif">
  <rect width="800" height="420" fill="#f9fafb" rx="12"/>
  <text x="400" y="36" font-size="18" font-weight="700" fill="#14365e" text-anchor="middle">Why Michigan Home Insurance Rates Keep Rising</text>
  <text x="400" y="56" font-size="13" fill="#6b7280" text-anchor="middle">Average Michigan premium up 21% over 2 years — here's where it's coming from</text>

  <!-- Horizontal bar chart -->
  <!-- Factor 1: Reinsurance -->
  <text x="220" y="98" font-size="13" fill="#374151" text-anchor="end">Reinsurance cost surge</text>
  <rect x="230" y="82" width="340" height="28" rx="4" fill="#c8952a"/>
  <text x="578" y="101" font-size="12" fill="#374151">+35% industry-wide</text>

  <!-- Factor 2: Catastrophe losses -->
  <text x="220" y="138" font-size="13" fill="#374151" text-anchor="end">Severe weather / hail claims</text>
  <rect x="230" y="122" width="280" height="28" rx="4" fill="#14365e"/>
  <text x="518" y="141" font-size="12" fill="#374151">MI hail up 40% since 2020</text>

  <!-- Factor 3: Construction costs -->
  <text x="220" y="178" font-size="13" fill="#374151" text-anchor="end">Construction &amp; labor costs</text>
  <rect x="230" y="162" width="250" height="28" rx="4" fill="#1e4d8c"/>
  <text x="488" y="181" font-size="12" fill="#374151">Lumber +80% peak, still elevated</text>

  <!-- Factor 4: Supply chain -->
  <text x="220" y="218" font-size="13" fill="#374151" text-anchor="end">Supply chain / materials</text>
  <rect x="230" y="202" width="200" height="28" rx="4" fill="#2563eb"/>
  <text x="438" y="221" font-size="12" fill="#374151">Delays drive higher claims costs</text>

  <!-- Factor 5: Wildfire/smoke -->
  <text x="220" y="258" font-size="13" fill="#374151" text-anchor="end">Inflation on everything</text>
  <rect x="230" y="242" width="180" height="28" rx="4" fill="#4b7fd4"/>
  <text x="418" y="261" font-size="12" fill="#374151">Replacement costs up 18%</text>

  <!-- Factor 6: Water damage -->
  <text x="220" y="298" font-size="13" fill="#374151" text-anchor="end">Water damage frequency</text>
  <rect x="230" y="282" width="140" height="28" rx="4" fill="#7aa6dc"/>
  <text x="378" y="301" font-size="12" fill="#374151">Burst pipes, ice dams, flooding</text>

  <!-- What you can do -->
  <rect x="40" y="330" width="720" height="72" rx="8" fill="#14365e" opacity="0.08" stroke="#14365e" stroke-width="1" stroke-opacity="0.2"/>
  <text x="400" y="353" font-size="13" font-weight="700" fill="#14365e" text-anchor="middle">What Actually Moves the Needle on Your Premium</text>
  <text x="400" y="374" font-size="12" fill="#374151" text-anchor="middle">Higher deductible · Bundle home+auto · Security system · Newer roof · Shop multiple carriers via independent agent</text>
  <text x="400" y="393" font-size="12" fill="#c8952a" text-anchor="middle">One call to JJA compares 10+ Michigan carriers simultaneously</text>
</svg>